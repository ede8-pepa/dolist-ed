<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;font-family:'Georgia','Palatino Linotype',serif;background:#d4d8dc;min-height:100vh;}
input,textarea,select,button{font-family:'Georgia','Palatino Linotype',serif;}
#app{display:flex;min-height:100vh;}
.spine{width:22px;background:linear-gradient(90deg,#7a1010,#c0392b,#7a1010);flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:16px;gap:10px;box-shadow:2px 0 8px rgba(0,0,0,.35);position:sticky;top:0;height:100vh;z-index:5;}
.ring{width:14px;height:14px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#e8e8e8,#888);box-shadow:inset 0 1px 3px rgba(0,0,0,.5),0 1px 1px rgba(255,255,255,.3);}
.pages{flex:1;background:#f5f0e4;background-image:repeating-linear-gradient(transparent,transparent 27px,#c5cdd8 27px,#c5cdd8 28px);min-height:100vh;overflow-y:auto;padding-bottom:60px;}
.cover-band{background:linear-gradient(90deg,#1a3a5c,#2e6da4);padding:10px 12px 9px;border-bottom:3px solid #8b1a1a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.cover-left{display:flex;align-items:center;gap:10px;}
.cover-logo{width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.cover-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.cover-sub{font-size:10px;color:#a8c8e8;margin-top:1px;}
.cover-stats{display:flex;gap:10px;font-size:10px;color:#fff;flex-wrap:wrap;}
.sync-indicator{font-size:10px;color:#a8c8e8;display:flex;align-items:center;gap:4px;}
.tab-bar{display:flex;align-items:center;background:#e8e0cc;border-bottom:2px solid #c8b89a;padding:0 12px;}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;padding:10px 11px;font-size:12px;font-weight:600;color:#7a6a50;cursor:pointer;}
.tab.on{border-bottom:3px solid #1a3a5c;color:#1a3a5c;}
.add-tab-btn{margin-left:auto;background:#1a3a5c;color:#fff;border:none;border-radius:6px;padding:5px 13px;font-size:18px;cursor:pointer;line-height:1;}
.filter-zone{padding:8px 12px 6px;border-bottom:1px solid #c8d0dc;background:rgba(255,255,255,.4);display:flex;flex-direction:column;gap:6px;}
.search-box{width:100%;background:rgba(255,255,255,.85);border:1px solid #c8b89a;border-radius:8px;padding:8px 12px;font-size:13px;color:#1a2a3a;outline:none;}
.filter-row{display:flex;flex-direction:column;gap:4px;}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;}
.chip{display:flex;align-items:center;gap:4px;background:transparent;border:1px solid #c8b89a;border-radius:20px;padding:3px 10px;font-size:11px;color:#7a6a50;cursor:pointer;}
.chip.on{background:rgba(26,58,92,.12);font-weight:700;color:#1a3a5c;}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.week-nav{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #c8d0dc;flex-wrap:wrap;}
.nav-btn{background:#1a3a5c;color:#fff;border:none;border-radius:6px;width:28px;height:28px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.week-label{flex:1;font-size:13px;font-weight:700;color:#1a3a5c;text-align:center;}
.today-btn{background:transparent;border:1px solid #1a3a5c;color:#1a3a5c;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;}
.day-tabs{display:flex;gap:2px;padding:7px 8px;background:rgba(255,255,255,.3);border-bottom:1px solid #c8d0dc;overflow-x:auto;}
.day-tab{flex:1;min-width:36px;background:#e8e0cc;border:1px solid #c8b89a;border-radius:6px 6px 0 0;padding:5px 2px;text-align:center;font-size:11px;color:#7a6a50;cursor:pointer;position:relative;}
.day-tab.today{background:#fff8e1;border-color:#d4a840;color:#b7950b;font-weight:700;}
.day-tab.sel{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.day-tab .day-short{font-size:9px;opacity:.75;}
.day-tab .day-num{font-size:15px;font-weight:800;}
.nb-badge{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);min-width:15px;height:15px;border-radius:8px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800;padding:0 3px;}
.day-page{padding-bottom:40px;}
.day-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:2px solid #1a3a5c;background:rgba(255,255,255,.5);}
.day-name{font-size:18px;font-weight:800;color:#1a3a5c;}
.day-date-str{font-size:11px;color:#7a6a50;margin-top:1px;}
.day-add-btn{background:#1a3a5c;color:#fff;border:none;border-radius:6px;padding:7px 13px;font-size:12px;cursor:pointer;font-weight:700;}
.empty-day{padding:22px 14px;color:#a0a8b0;font-size:13px;display:flex;align-items:center;gap:10px;}
.row{border-bottom:1px solid #c8d0dc;transition:background .15s;}
.row.expanded{background:#eef3fa;}
.row.done{opacity:.65;}
.row-main{display:flex;align-items:center;gap:6px;padding:7px 10px 7px 12px;min-height:38px;}
.urg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.row-time{font-size:10px;color:#1a3a5c;font-weight:700;min-width:34px;font-family:monospace;}
.st-btn{background:transparent;border:none;cursor:pointer;font-size:17px;padding:0 2px;flex-shrink:0;}
.row-body{flex:1;min-width:0;cursor:pointer;}
.row-title-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.row-title{font-size:13px;font-weight:600;line-height:1.3;}
.row-title.done-txt{text-decoration:line-through;color:#aaa;}
.row-title.overdue{color:#c0392b;}
.cat-tag{font-size:9px;font-weight:800;border-radius:10px;padding:2px 7px;flex-shrink:0;}
.overdue-tag{font-size:10px;color:#c0392b;font-weight:700;}
.sub-info{font-size:11px;color:#7a6a50;}
.row-icon-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:2px 3px;color:#a0a8b0;flex-shrink:0;}
.detail{padding:6px 12px 10px 34px;border-top:1px dashed #c8d0dc;background:rgba(255,255,255,.55);display:flex;flex-direction:column;gap:5px;}
.d-line{font-size:12px;color:#3e2a1a;display:flex;gap:6px;align-items:flex-start;}
.rem-btn-sm{display:inline-block;margin-top:4px;background:#1565c0;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none;}
.no-date-hint{font-size:11px;color:#a0a8b0;font-style:italic;}
.del-row{background:#fff0ee;border-top:1px solid #e74c3c;padding:6px 12px;display:flex;align-items:center;gap:8px;}
.del-label{color:#c0392b;font-weight:700;font-size:12px;}
.del-yes{background:#e74c3c;border:none;color:#fff;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.del-no{background:transparent;border:1px solid #ccc;color:#666;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;}
.list-zone{padding-bottom:50px;}
.date-group{display:flex;align-items:center;gap:8px;padding:10px 12px 4px;}
.dgl{flex:1;height:1px;background:#1a3a5c;opacity:.25;}
.dg-label{font-size:11px;font-weight:800;color:#1a3a5c;text-transform:uppercase;letter-spacing:.8px;background:#f5f0e4;padding:0 4px;}
.empty-state{text-align:center;padding:50px 20px;color:#a0a8b0;display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-state .big-icon{font-size:44px;}
.empty-state p{font-size:14px;margin:0;}
.loading{text-align:center;padding:40px;color:#1a3a5c;font-size:14px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:999;pointer-events:none;opacity:1;transition:opacity .3s;}
.toast.hide{opacity:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.modal{width:100%;max-width:560px;max-height:93vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;background:#f5f0e4;box-shadow:0 -4px 24px rgba(0,0,0,.3);}
.modal-spine{width:14px;background:linear-gradient(90deg,#7a1010,#c0392b,#7a1010);flex-shrink:0;}
.modal-inner{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:2px solid #1a3a5c;background:rgba(255,255,255,.5);flex-shrink:0;}
.modal-head-title{font-size:15px;font-weight:800;color:#1a3a5c;}
.close-btn{background:#1a3a5c;border:none;color:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:12px;}
.modal-body{padding:12px 14px;overflow-y:auto;flex:1;}
.modal-foot{padding:10px 14px 28px;display:flex;gap:8px;border-top:1px solid #c8d0dc;background:rgba(255,255,255,.3);flex-shrink:0;}
.fl{margin-bottom:10px;}
.fl label{display:block;font-size:11px;color:#1a3a5c;font-weight:700;margin-bottom:3px;}
.inp{width:100%;background:rgba(255,255,255,.8);border:1px solid #c8b89a;border-radius:5px;padding:8px 10px;font-size:13px;color:#1a2a3a;outline:none;}
textarea.inp{resize:vertical;min-height:56px;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-btns{display:flex;gap:8px;}
.cat-btn{flex:1;padding:8px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid;transition:all .15s;}
.urg-btns{display:flex;flex-wrap:wrap;gap:5px;}
.urg-btn{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid;}
.rem-btn{display:block;margin-top:8px;text-align:center;background:#1565c0;color:#fff;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;text-decoration:none;}
.cancel-btn{flex:1;background:transparent;border:1px solid #c8b89a;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;color:#7a6a50;}
.save-btn{flex:2;background:#1a3a5c;border:none;color:#fff;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;}
.save-btn:disabled{opacity:.4;}
</style>
</head>

<div id="app">
  <div class="spine" id="spine"></div>

</div>
<div class="toast hide" id="toast"></div>
<div class="overlay" id="overlay" style="display:none" onclick="closeModal(event)">

      <div class="modal-head">

        <button class="close-btn" onclick="closeModalDirect()">✕</button>
      </div>

      <div class="modal-foot">
        <button class="cancel-btn" onclick="closeModalDirect()">Annuler</button>
        <button class="save-btn" id="save-btn" onclick="saveTask()">📌 Ajouter</button>
      </div>
    </div>
  </div>
</div>

/* ── Supabase REST helpers ── */
async function sbFetch(method,path,body){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    method,
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":"return=representation"},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}
const sbGet=()=>sbFetch("GET","tasks?order=date.asc,heure.asc");
const sbInsert=(t)=>sbFetch("POST","tasks",t);
const sbUpdate=(id,t)=>sbFetch("PATCH",`tasks?id=eq.${id}`,t);
const sbDelete=(id)=>sbFetch("DELETE",`tasks?id=eq.${id}`);

const URGENCY=[{id:"critique",label:"🔴 Critique",color:"#c0392b",dot:"#e74c3c"},{id:"urgent",label:"🟠 Urgent",color:"#d35400",dot:"#e67e22"},{id:"normal",label:"🟡 Normal",color:"#b7950b",dot:"#f1c40f"},{id:"faible",label:"🟢 Faible",color:"#1e8449",dot:"#2ecc71"}];
const CATS=[{id:"pro",label:"💼 Pro",bg:"#1a3a5c",color:"#fff"},{id:"perso",label:"🏠 Perso",bg:"#6d4c41",color:"#fff"}];
const STATUS={todo:{icon:"○",label:"À faire",color:"#7f8c8d",next:"inprogress"},inprogress:{icon:"◑",label:"En cours",color:"#2980b9",next:"done"},done:{icon:"●",label:"Terminé",color:"#27ae60",next:"todo"}};
const DAYS_F=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const DAYS_S=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const MONTHS_S=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];

let tasks=[],view="semaine",weekOffset=0,selDay=today(),expanded=null,delConfirm=null,fUrgence="all",fCat="all",search="",editId=null,formData={},syncing=false;

function today(){return new Date().toISOString().split("T")[0];}
function fmtDate(d){if(!d)return"";const[y,m,day]=d.split("-");return`${parseInt(day)} ${MONTHS_S[parseInt(m)-1]} ${y}`;}
function fmtDateLong(d){if(!d)return"";const dt=new Date(d+"T12:00:00");return`${DAYS_F[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;}
function isOverdue(date,statut){return date&&date<today()&&statut!=="done";}
function getWeekDates(offset){const now=new Date(),dow=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1)+offset*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});}
function appleReminder(task){const title=encodeURIComponent(`[${task.urgence.toUpperCase()}] ${task.titre}`);const notes=encodeURIComponent([task.pourquoi&&`Pourquoi : ${task.pourquoi}`,task.personne&&`Responsable : ${task.personne}`,task.telephone&&`Tél : ${task.telephone}`,task.lieu&&`Lieu : ${task.lieu}`,task.description&&`Note : ${task.description}`].filter(Boolean).join("\n"));let url=`reminders://x-callback-url/add?title=${title}`;if(notes)url+=`&notes=${notes}`;if(task.date)url+=`&due-date=${encodeURIComponent(`${task.date}T${task.heure||"09:00"}:00`)}`;return url;}
function applyFilters(list){return list.filter(t=>fUrgence==="all"||t.urgence===fUrgence).filter(t=>fCat==="all"||t.categorie===fCat).filter(t=>!search||t.titre.toLowerCase().includes(search.toLowerCase())||(t.personne||"").toLowerCase().includes(search.toLowerCase())||(t.lieu||"").toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{if(a.heure&&b.heure)return a.heure.localeCompare(b.heure);return["critique","urgent","normal","faible"].indexOf(a.urgence)-["critique","urgent","normal","faible"].indexOf(b.urgence);});}
function tasksFor(d){return applyFilters(tasks.filter(t=>t.date===d));}
function allSorted(){return applyFilters([...tasks]).sort((a,b)=>(a.date||"").localeCompare(b.date||""));}

let toastTimer=null;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hide");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.add("hide"),2400);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function loadTasks(){
  syncing=true;render();
  try{
    const data=await sbGet();
    tasks=data||[];
  }catch(e){
    showToast("⚠️ Erreur chargement — mode hors ligne");
    try{const s=localStorage.getItem("dolist_ed_backup");if(s)tasks=JSON.parse(s);}catch(e2){}
  }
  syncing=false;render();
}
function backupLocal(){try{localStorage.setItem("dolist_ed_backup",JSON.stringify(tasks));}catch(e){}}

function render(){renderSpine();renderPages();}
function renderSpine(){document.getElementById("spine").innerHTML=Array.from({length:20}).map(()=>`<div class="ring"></div>`).join("");}

  let html=`<div class="cover-band">
<div class="cover-left"><img class="cover-logo" src="data:image/png;base64,${ICON_DATA}" alt="logo"/><div><div class="cover-title">To Do List</div><div class="cover-sub">by ED — ${MONTHS[now.getMonth()]} ${now.getFullYear()} ${syncing?'⏳':' ☁️'}</div></div></div>
<div class="cover-stats"><span style="color:#ffaaaa">⬤ ${counts.critique} critiques</span><span style="color:#ffd580">⬤ ${counts.enCours} en cours</span><span style="color:#90ee90">⬤ ${counts.done} ok</span></div>
</div>
<div class="tab-bar"><button class="tab ${view==='semaine'?'on':''}" onclick="setView('semaine')">📅 Semaine</button><button class="tab ${view==='jour'?'on':''}" onclick="setView('jour')">📆 Jour</button><button class="tab ${view==='liste'?'on':''}" onclick="setView('liste')">📋 Liste</button><button class="add-tab-btn" onclick="openNew('')">＋</button></div>
<div class="filter-zone"><input class="search-box" placeholder="🔍 Rechercher…" value="${esc(search)}" oninput="setSearch(this.value)"/>
<div class="filter-row"><div class="filter-group"><button class="chip ${fCat==='all'?'on':''}" onclick="setFCat('all')"><span class="chip-dot" style="background:#1a3a5c"></span>Tout</button>${CATS.map(c=>`<button class="chip ${fCat===c.id?'on':''}" onclick="setFCat('${c.id}')"><span class="chip-dot" style="background:${c.bg}"></span>${c.label}</button>`).join("")}</div>
<div class="filter-group"><button class="chip ${fUrgence==='all'?'on':''}" onclick="setFUrg('all')"><span class="chip-dot" style="background:#1a3a5c"></span>Tout</button>${URGENCY.map(u=>`<button class="chip ${fUrgence===u.id?'on':''}" onclick="setFUrg('${u.id}')"><span class="chip-dot" style="background:${u.dot}"></span>${u.label.replace(/🔴|🟠|🟡|🟢/g,"").trim()}</button>`).join("")}</div></div></div>`;

  if(syncing){html+=`<div class="loading">⏳ Chargement depuis Supabase…</div>`;p.innerHTML=html;return;}

  if(view==="semaine"){
    const wd=getWeekDates(weekOffset);const ws=new Date(wd[0]+"T12:00:00"),we=new Date(wd[6]+"T12:00:00");
    const wlabel=ws.getMonth()===we.getMonth()?`${ws.getDate()} – ${we.getDate()} ${MONTHS[ws.getMonth()]} ${ws.getFullYear()}`:`${ws.getDate()} ${MONTHS_S[ws.getMonth()]} – ${we.getDate()} ${MONTHS_S[we.getMonth()]} ${ws.getFullYear()}`;
    html+=`<div class="week-nav"><button class="nav-btn" onclick="setWeekOffset(${weekOffset-1})">‹</button><span class="week-label">${wlabel}</span><button class="nav-btn" onclick="setWeekOffset(${weekOffset+1})">›</button>${weekOffset!==0?`<button class="today-btn" onclick="setWeekOffset(0)">Aujourd'hui</button>`:""}</div>`;
    html+=`<div class="day-tabs">${wd.map(d=>{const dt=new Date(d+"T12:00:00");const isT=d===today(),isSel=d===selDay;const nb=tasks.filter(t=>t.date===d).length;return`<button class="day-tab ${isT?"today":""} ${isSel?"sel":""}" onclick="setSelDay('${d}')"><div class="day-short">${DAYS_S[dt.getDay()]}</div><div class="day-num">${dt.getDate()}</div>${nb>0?`<div class="nb-badge" style="background:${isSel?"#fff":"#1a3a5c"};color:${isSel?"#1a3a5c":"#fff"}">${nb}</div>`:""}</button>`;}).join("")}</div>`;
    html+=renderDayPage(selDay,tasksFor(selDay));
  }
  if(view==="jour"){
    html+=`<div class="week-nav"><button class="nav-btn" onclick="shiftDay(-1)">‹</button><span class="week-label">${fmtDateLong(selDay)}</span><button class="nav-btn" onclick="shiftDay(1)">›</button>${selDay!==today()?`<button class="today-btn" onclick="setSelDay('${today()}')">Auj.</button>`:""}</div>`;
    html+=renderDayPage(selDay,tasksFor(selDay));
  }
  if(view==="liste"){
    const all=allSorted();html+=`<div class="list-zone">`;
    if(all.length===0){html+=`<div class="empty-state"><div class="big-icon">📋</div><p>Aucune tâche — appuie sur ＋</p></div>`;}
    else{const dates=[...new Set(all.map(t=>t.date||"—"))];dates.forEach(date=>{html+=`<div class="date-group"><div class="dgl"></div><span class="dg-label">${date==="—"?"Sans date":fmtDate(date)}</span><div class="dgl"></div></div>`;all.filter(t=>(t.date||"—")===date).forEach(task=>{html+=renderTaskRow(task,true);});});}
    html+=`</div>`;
  }
  p.innerHTML=html;
}

function renderDayPage(date,taskList){const dt=new Date(date+"T12:00:00");let html=`<div class="day-page"><div class="day-head"><div><div class="day-name">${DAYS_F[dt.getDay()]}</div><div class="day-date-str">${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}</div></div><button class="day-add-btn" onclick="openNew('${date}')">＋ Tâche</button></div><div class="ruled">`;if(taskList.length===0){html+=`<div class="empty-day">📄 Aucune tâche — appuie sur ＋ Tâche</div>`;}else{taskList.forEach(task=>{html+=renderTaskRow(task,true);});}html+=`</div></div>`;return html;}

function renderTaskRow(task,showTime){const urg=URGENCY.find(u=>u.id===task.urgence);const st=STATUS[task.statut];const cat=CATS.find(c=>c.id===task.categorie);const isEx=expanded===task.id;const done=task.statut==="done";const over=isOverdue(task.date,task.statut);let html=`<div class="row ${isEx?"expanded":""} ${done?"done":""}" id="row-${task.id}"><div class="row-main"><div class="urg-dot" style="background:${urg.dot}"></div>${showTime&&task.heure?`<div class="row-time">${task.heure}</div>`:""}<button class="st-btn" style="color:${st.color}" onclick="cycleStatus(${task.id})" title="${st.label}">${st.icon}</button><div class="row-body" onclick="toggleExpand(${task.id})"><div class="row-title-line"><span class="row-title ${done?"done-txt":over?"overdue":""}">${esc(task.titre)}</span>${cat?`<span class="cat-tag" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>`:""} ${over?`<span class="overdue-tag">⚠️ En retard</span>`:""}</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;">${task.personne?`<span class="sub-info">👤 ${esc(task.personne)}</span>`:""}${task.lieu?`<span class="sub-info">📍 ${esc(task.lieu)}</span>`:""}</div></div><button class="row-icon-btn" onclick="openEdit(${task.id})">✏️</button><button class="row-icon-btn" onclick="confirmDel(${task.id})">🗑️</button></div>`;if(isEx){html+=`<div class="detail">${task.description?`<div class="d-line"><b>📝</b>${esc(task.description)}</div>`:""} ${task.pourquoi?`<div class="d-line"><b>❓</b>${esc(task.pourquoi)}</div>`:""} ${task.personne?`<div class="d-line"><b>👤</b>${esc(task.personne)}</div>`:""} ${task.telephone?`<div class="d-line"><b>📞</b><a href="tel:${esc(task.telephone)}" style="color:#1565c0;font-weight:700">${esc(task.telephone)}</a></div>`:""} ${task.lieu?`<div class="d-line"><b>📍</b>${esc(task.lieu)}</div>`:""} ${task.date?`<div class="d-line"><b>📅</b>${task.heure} · ${fmtDate(task.date)}</div>`:""} ${task.date?`<a href="${appleReminder(task)}" class="rem-btn-sm">🔔 Ajouter aux Rappels iPhone</a>`:`<div class="no-date-hint">💡 Ajoute une date pour un rappel iPhone</div>`}</div>`;}if(delConfirm===task.id){html+=`<div class="del-row"><span class="del-label">Supprimer ?</span><button class="del-yes" onclick="doDelete(${task.id})">Oui</button><button class="del-no" onclick="cancelDel()">Non</button></div>`;}html+=`</div>`;return html;}

function openNew(date){editId=null;formData={id:Date.now(),titre:"",description:"",urgence:"normal",statut:"todo",categorie:"pro",personne:"",telephone:"",pourquoi:"",lieu:"",date:date||today(),heure:"09:00"};renderModal();document.getElementById("overlay").style.display="flex";}
function openEdit(id){const task=tasks.find(t=>t.id==id);if(!task)return;editId=id;formData={...task};renderModal();document.getElementById("overlay").style.display="flex";}
function closeModal(e){if(e.target===document.getElementById("overlay"))closeModalDirect();}
function closeModalDirect(){document.getElementById("overlay").style.display="none";}
function renderModal(){
  document.getElementById("modal-title").textContent=editId?"✏️ Modifier la tâche":"📌 Nouvelle tâche";
  document.getElementById("save-btn").textContent=editId?"💾 Enregistrer":"📌 Ajouter";
  const fd=formData;
  document.getElementById("modal-body").innerHTML=`<div class="fl"><label>Catégorie</label><div class="cat-btns">${CATS.map(c=>`<button class="cat-btn" style="background:${fd.categorie===c.id?c.bg:"transparent"};color:${fd.categorie===c.id?c.color:c.bg};border-color:${c.bg}" onclick="setForm('categorie','${c.id}')">${c.label}</button>`).join("")}</div></div><div class="fl"><label>Titre *</label><input class="inp" placeholder="Ex : Appeler le fournisseur…" value="${esc(fd.titre)}" oninput="setForm('titre',this.value)"/></div><div class="fl"><label>📝 Description</label><textarea class="inp" placeholder="Détails…" oninput="setForm('description',this.value)">${esc(fd.description)}</textarea></div><div class="f-row"><div class="fl"><label>🎯 Urgence</label><div class="urg-btns">${URGENCY.map(u=>`<button class="urg-btn" style="background:${fd.urgence===u.id?u.dot:"transparent"};color:${fd.urgence===u.id?"#fff":u.dot};border-color:${u.dot}" onclick="setForm('urgence','${u.id}')">${u.label}</button>`).join("")}</div></div><div class="fl"><label>📋 Statut</label><select class="inp" onchange="setForm('statut',this.value)">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${fd.statut===k?"selected":""}>${v.icon} ${v.label}</option>`).join("")}</select></div></div><div class="f-row"><div class="fl"><label>👤 Responsable</label><input class="inp" placeholder="Nom prénom" value="${esc(fd.personne)}" oninput="setForm('personne',this.value)"/></div><div class="fl"><label>📞 Téléphone</label><input class="inp" placeholder="06 XX XX XX XX" value="${esc(fd.telephone)}" oninput="setForm('telephone',this.value)"/></div></div><div class="fl"><label>📍 Lieu / Adresse</label><input class="inp" placeholder="Ex : Chantier Rue de la Paix…" value="${esc(fd.lieu)}" oninput="setForm('lieu',this.value)"/></div><div class="fl"><label>❓ Pourquoi ?</label><input class="inp" placeholder="Raison, objectif…" value="${esc(fd.pourquoi)}" oninput="setForm('pourquoi',this.value)"/></div><div class="f-row"><div class="fl"><label>📅 Date limite</label><input class="inp" type="date" value="${fd.date}" onchange="setForm('date',this.value)"/></div><div class="fl"><label>🕐 Heure</label><input class="inp" type="time" value="${fd.heure}" onchange="setForm('heure',this.value)"/></div></div>${fd.date?`<a href="${appleReminder(fd)}" class="rem-btn">🔔 Créer le rappel dans iPhone Rappels</a>`:""}`;
}
function setForm(key,val){formData[key]=val;if(key==="categorie"||key==="urgence"){renderModal();return;}document.getElementById("save-btn").disabled=!formData.titre||!formData.titre.trim();}

async function saveTask(){
  if(!formData.titre||!formData.titre.trim())return;
  try{
    if(editId){
      const {id,...data}=formData;
      await sbUpdate(editId,data);
      tasks=tasks.map(t=>t.id==editId?{...formData}:t);
      showToast("✏️ Modifiée !");
    }else{
      const res=await sbInsert(formData);
      tasks=[...tasks,...(Array.isArray(res)?res:[res])];
      showToast("📌 Ajoutée !");
    }
    backupLocal();
  }catch(e){showToast("⚠️ Erreur sauvegarde");}
  closeModalDirect();render();
}
async function cycleStatus(id){
  const task=tasks.find(t=>t.id==id);if(!task)return;
  const newStatut=STATUS[task.statut].next;
  try{await sbUpdate(id,{statut:newStatut});tasks=tasks.map(t=>t.id==id?{...t,statut:newStatut}:t);backupLocal();}catch(e){showToast("⚠️ Erreur sync");}
  render();
}
function toggleExpand(id){expanded=expanded==id?null:id;render();}
function confirmDel(id){delConfirm=id;render();}
function cancelDel(){delConfirm=null;render();}
async function doDelete(id){
  try{await sbDelete(id);tasks=tasks.filter(t=>t.id!=id);backupLocal();showToast("🗑️ Supprimée");}catch(e){showToast("⚠️ Erreur suppression");}
  delConfirm=null;render();
}
function setView(v){view=v;expanded=null;render();}
function setWeekOffset(o){weekOffset=o;render();}
function setSelDay(d){selDay=d;expanded=null;render();}
function shiftDay(n){const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()+n);selDay=d.toISOString().split("T")[0];expanded=null;render();}
function setSearch(v){search=v;render();}
function setFUrg(v){fUrgence=v;render();}
function setFCat(v){fCat=v;render();}

renderSpine();
loadTasks();
</script>
</body>
</html>
